project:
  run_name: qwen3_8b_adele_judge
  output_dir: runs/qwen3_8b_adele_judge
  seed: 42

data:
  path: data/processed/response_scores.parquet
  prepared_dir: null
  columns:
    question: question
    reference_answer: ground_truth
    response: response
    judge_1_score: score_gpt4o
    judge_2_score: score_sonnet
    model_id: model_id
    benchmark: benchmark
    task: task
    example_id: instance_id
    source: source
  filters:
    # Response-only cap: filters the model response before prompt formatting.
    # This is independent from training.max_seq_length below.
    max_disagreement: 1
    max_response_tokens: 4096
    # Full-sequence overflow policy after chat formatting. Passing max_response_tokens
    # does not guarantee that an example fits in max_seq_length.
    on_sequence_overflow: skip
  token_length_batch_size: 512

model:
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  adapter_path: null
  trust_remote_code: true

prompt:
  system_prompt: |
    You are ADeLe-Judge, an evaluator specialized in the ADeLe benchmark suite.

    Score the model response against the reference answer.

    Return exactly one integer: 1, 2, 3, 4, or 5.

    Rubric:
    1 = clearly incorrect
    2 = mostly incorrect
    3 = minimally acceptable / sufficient
    4 = mostly correct
    5 = fully correct

    Downstream decision:
    3, 4, and 5 are considered CORRECT.
    1 and 2 are considered INCORRECT.

    Do not provide explanations.

split:
  mode: fixed_by_model
  validation_models:
    - DK-R1-Dist-Qwen-14B
    - gemini-2.5-flash
  test_models:
    - llama3d2-11b
  train_models: auto_except_val_test
  held_out_model: null

training:
  # Full chat-formatted sequence length: system + user + response + score target.
  # Qwen3-8B supports a much longer native context; 8192 is a conservative QLoRA default.
  max_seq_length: 8192
  load_in_4bit: true
  dtype: bfloat16
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: auto
  learning_rate: 1.0e-4
  num_train_epochs: 1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 1
  warmup_steps: 450
  lr_scheduler_type: cosine
  weight_decay: 0.0
  optim: adamw_8bit
  packing: false
  train_sampling_strategy: group_by_length
  length_column_name: length
  logging_steps: 20
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  seed: 42

inference:
  allowed_scores: ["1", "2", "3", "4", "5"]
  binary_threshold: 3
  method: restricted_continuation_logprobs
  generation_fallback: false
  batch_size: 1

evaluation:
  length_buckets: [0, 256, 512, 1024, 2048, 4096, 8192, 1000000000]
