project:
  run_name: qwen3_8b_adele_judge
  output_dir: runs/qwen3_8b_adele_judge
  seed: 42

data:
  path: data/processed/response_scores.parquet
  prepared_dir: null
  columns:
    question: question
    reference_answer: ground_truth
    response: response
    judge_1_score: score_gpt4o
    judge_2_score: score_sonnet
    model_id: model_id
    benchmark: benchmark
    task: task
    example_id: instance_id
    source: source
  filters:
    # Response-only cap: filters the model response before prompt formatting.
    # This is independent from training.max_seq_length below.
    max_disagreement: 1
    max_response_tokens: 3072
    # Full-sequence overflow policy after chat formatting. Passing max_response_tokens
    # does not guarantee that an example fits in max_seq_length.
    on_sequence_overflow: skip
  token_length_batch_size: 512

model:
  model_name_or_path: Qwen/Qwen3-8B
  revision: null
  # Used only by the Transformers fallback/inference loaders.
  # Unsloth chooses and patches its own attention backend during training.
  attn_implementation: flash_attention_2
  adapter_path: null
  trust_remote_code: true
  # Optional. Applied only when the tokenizer chat template supports enable_thinking.
  # For Qwen3-style templates, the default judge behavior is non-thinking mode.
  thinking_mode:
    enabled: false
    apply_if_supported: true

prompt:
  system_prompt: |
    You are ADeLe-Judge, an evaluator specialized in the ADeLe benchmark suite.

    Score the model response against the reference answer.

    Return exactly one integer: 1, 2, 3, 4, or 5.

    Rubric:
    1 = clearly incorrect
    2 = mostly incorrect
    3 = minimally acceptable / sufficient
    4 = mostly correct
    5 = fully correct

    Downstream decision:
    3, 4, and 5 are considered CORRECT.
    1 and 2 are considered INCORRECT.

    Do not provide explanations.

split:
  mode: fixed_by_model
  validation_models:
    - DK-R1-Dist-Qwen-14B
    - gemini-2.5-flash
  test_models:
    - llama3d2-11b
  train_models: auto_except_val_test
  held_out_model: null
  # In leave-one-model-out mode, held-out examples are reserved for final test.
  # Validation is sampled from the remaining training-side models for monitoring.
  lomo_validation_fraction: 0.05
  lomo_validation_max_examples: 30000
  lomo_validation_seed: 42

training:
  # Full chat-formatted sequence length: system + user + response + score target.
  # A5000 24GB full-run default: keeps >99.9% of prepared examples while avoiding 8K-context cost.
  max_seq_length: 4096
  load_in_4bit: true
  dtype: bfloat16
  objective: restricted_score_ce
  class_weighting: null
  score_class_weights: null
  lora_r: 32
  lora_alpha: 64
  # Unsloth's fastest path is dropout-free; use score_class_weights/class_weighting for imbalance experiments.
  lora_dropout: 0.0
  target_modules: auto
  learning_rate: 1.0e-4
  num_train_epochs: 1
  # Tuned for ~18GB baseline VRAM on A5000 24GB: same effective batch, fewer accumulation steps.
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  warmup_steps: 450
  lr_scheduler_type: cosine
  weight_decay: 0.0
  optim: adamw_8bit
  packing: false
  cache_tokenized_datasets: true
  # Monitor on a subset during training; run full restricted-continuation eval after training.
  eval_subset_size: 4096
  train_sampling_strategy: group_by_length
  length_column_name: length
  logging_steps: 20
  # Full training cadence for ~15K optimizer steps at effective batch size 16.
  eval_steps: 5000
  save_steps: 5000
  save_total_limit: 3
  seed: 42

inference:
  allowed_scores: ["1", "2", "3", "4", "5"]
  binary_threshold: 3
  method: restricted_continuation_logprobs_fast
  generation_fallback: false
  batch_size: 64
  require_adapter: false
  allow_base_model: true

evaluation:
  length_buckets: [0, 256, 512, 1024, 2048, 3072, 4096, 1000000000]
