project:
  run_name: qwen3_8b_adele_judge
  output_dir: runs/qwen3_8b_adele_judge
  seed: 42

data:
  path: data/processed/response_scores.parquet
  prepared_dir: null
  columns:
    question: question
    reference_answer: ground_truth
    response: response
    judge_1_score: score_gpt4o
    judge_2_score: score_sonnet
    model_id: model_id
    benchmark: benchmark
    task: task
    example_id: instance_id
    source: source
  filters:
    # Response-only cap: filters the model response before prompt formatting.
    # This is independent from training.max_seq_length below.
    max_disagreement: 1
    max_response_tokens: 4096
    # Full-sequence overflow policy after chat formatting. Passing max_response_tokens
    # does not guarantee that an example fits in max_seq_length.
    on_sequence_overflow: skip
  # "auto" uses all CPU cores visible to the process for response length
  # measurement, sequence checks, and train-time tokenization.
  # Set to 1 for serial preprocessing.
  preprocessing_num_workers: auto
  # Lets fast Hugging Face tokenizers use their native thread pool for batched
  # response-length measurements.
  tokenizers_parallelism: true
  token_length_batch_size: 2048

model:
  model_name_or_path: Qwen/Qwen3-8B
  revision: null
  # Used only by the Transformers fallback/inference loaders.
  # Unsloth chooses and patches its own attention backend during training.
  attn_implementation: flash_attention_2
  adapter_path: null
  trust_remote_code: true
  # Optional. Applied only when the tokenizer chat template supports enable_thinking.
  # For Qwen3-style templates, the default judge behavior is non-thinking mode.
  thinking_mode:
    enabled: false
    apply_if_supported: true

prompt:
  system_prompt: |
    You are an answer quality evaluator. You will receive a question, a reference
    answer, and a model response, each delimited by ### headers.

    Rate the model response on the following scale:
    1 - Surely incorrect: the response is wrong or completely misses the point.
    2 - Likely incorrect: the response has significant errors or critical omissions.
    3 - Minimally correct / sufficient: the response is partially correct or borderline.
    4 - Likely correct: the response is mostly correct with minor issues.
    5 - Surely correct: the response is fully correct and complete.

    Rules:
    - Base your rating strictly on correctness relative to the reference answer.
    - Ignore writing style, verbosity, or formatting unless they affect correctness.
    - If the final answer is correct but the reasoning contains substantive errors, lower the rating according to the severity of those errors.
    - Output only a single integer from 1 to 5. No explanation. No punctuation.

split:
  mode: fixed_by_model
  validation_models:
    - gemini-3-flash
    - DK-R1-Dist-Qwen-14B
    - llama3d2-3b
  #test_models:
  #  - o1-mini
  #  - llama3d2-11b
  train_models: auto_except_val_test
  held_out_model: null
  # In leave-one-model-out mode, held-out examples are reserved for final test.
  # Validation is sampled from the remaining training-side models for monitoring.
  lomo_validation_fraction: 0.05
  lomo_validation_max_examples: 30000
  lomo_validation_seed: 42

training:
  # Full chat-formatted sequence length: system + user + response + score target.
  # A5000 24GB throughput default: retains ~99.7% of prepared examples while reducing context cost.
  max_seq_length: 3072
  load_in_4bit: true
  dtype: bfloat16
  # Regime switch. Use restricted_score_ce for the CausalLM restricted scorer or
  # sequence_classification for AutoModelForSequenceClassification.
  objective: restricted_score_ce
  loss:
    # Used by sequence_classification. ce_5way_plus_binary adds an auxiliary
    # binary loss over scores {1, 2} vs {3, 4, 5}.
    type: ce_5way
    lambda_binary: 0.5
    class_weights: null
  class_weighting: null
  score_class_weights: null
  lora_r: 32
  lora_alpha: 64
  # Unsloth's fastest path is dropout-free; use score_class_weights/class_weighting for imbalance experiments.
  lora_dropout: 0.0
  target_modules: auto
  learning_rate: 1.0e-4
  num_train_epochs: 1
  per_device_train_batch_size: 5
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 3
  warmup_steps: 450
  lr_scheduler_type: cosine
  weight_decay: 0.0
  optim: adamw_8bit
  packing: false
  cache_tokenized_datasets: true
  # Monitor on a subset during training; run full eval after training.
  eval_subset_size: 8192
  eval_subset_strategy: stratified
  eval_subset_stratify_columns: [model_id, target_score]
  # Random batching is the canonical default. Use group_by_length only as an
  # explicit length-bucketing experiment.
  train_sampling_strategy: random
  length_column_name: length
  logging_steps: 50
  eval_steps: 1000
  save_steps: 3000
  save_total_limit: 10
  seed: 42
  resume_from_checkpoint: null

distributed:
  enabled: false
  strategy: ddp
  backend: nccl
  mixed_precision: null
  gradient_checkpointing: false
  find_unused_parameters: false
  fsdp:
    sharding_strategy: full_shard
    # For Qwen3 FSDP runs set this to Qwen3DecoderLayer.
    transformer_layer_cls_to_wrap: null
    activation_checkpointing: true
    use_orig_params: true
  deepspeed:
    zero_stage: 2
    offload_optimizer_device: none
    offload_param_device: none
    stage3_gather_16bit_weights_on_model_save: true
    gradient_clipping: auto
    config_overrides: {}

inference:
  allowed_scores: ["1", "2", "3", "4", "5"]
  binary_threshold: 3
  # Normalization keeps this compatible with training.objective:
  # restricted_continuation_logprobs_fast for causal regimes,
  # sequence_classification_logits for sequence_classification.
  method: restricted_continuation_logprobs_fast
  generation_fallback: false
  batch_size: 64
  require_adapter: false
  allow_base_model: true

evaluation:
  length_buckets: [0, 256, 512, 1024, 2048, 3072, 4096, 1000000000]

hub:
  repo_id: null
  private: false
  commit_message: Upload ADeLe distilled judge
  local_checkpoint_dir: null
  output_staging_dir: null
  create_pr: false
  max_shard_size: 5GB
